name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test the API
        run: |
          DATA_DIR="$RUNNER_TEMP" node --require reflect-metadata --import tsx server/index.ts &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health > /dev/null; then
              echo "API is up"
              curl -sf http://localhost:3001/api/accounts
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start within 30s"
          exit 1
