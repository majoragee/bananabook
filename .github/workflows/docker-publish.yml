name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      # Needed to publish the build provenance attestation.
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      # QEMU lets the amd64 runner build the arm64 image. better-sqlite3 has no
      # Alpine prebuilds, so arm64 compiles from source under emulation and is
      # substantially slower than amd64.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Skipped on pull requests: a fork PR has no permission to push, and we
      # only want to verify that the image still builds.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
          # flavor defaults to latest=auto, which applies ':latest' only to
          # semver tags -- so 'latest' tracks releases, not the tip of main.
          labels: |
            org.opencontainers.image.title=BananaBook
            org.opencontainers.image.description=A forward-looking checkbook that projects your bills account and names the date it runs dry.
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Records a signed, verifiable link between the image and the commit and
      # workflow that produced it.
      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
